<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO and Social Media Meta Tags -->
    <title>Prescripto Admin Portal - Healthcare Management System</title>
    <meta name="description" content="Professional healthcare administration portal for managing appointments, patients, and medical operations with advanced security and analytics." />
    <meta name="keywords" content="healthcare, medical administration, patient management, appointment system, medical dashboard" />
    <meta name="author" content="Prescripto Healthcare Solutions" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Prescripto Admin Portal" />
    <meta property="og:description" content="Professional healthcare administration portal with advanced security and analytics." />
    <meta property="og:image" content="/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Prescripto Admin Portal" />
    <meta property="twitter:description" content="Professional healthcare administration portal with advanced security and analytics." />
    <meta property="twitter:image" content="/og-image.jpg" />
    
    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="robots" content="noindex, nofollow" />
    
    <!-- Mobile Specific -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#5F6FFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Prescripto Admin" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Critical CSS -->
    <style>
      /* Critical rendering path optimizations */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: 'Inter', 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.6;
        color: #1a1a1a;
        background: #fafafa;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Loading animation */
      .loading-skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }
      
      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* Smooth transitions */
      .smooth-transition {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      /* Focus styles for accessibility */
      .focus-visible:focus-visible {
        outline: 2px solid #5F6FFF;
        outline-offset: 2px;
      }
    </style>
    
    <!-- Payment Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  </head>
  <body>
    <div id="root">
      <!-- Loading state -->
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: Inter, sans-serif;">
        <div style="text-align: center;">
          <div class="loading-skeleton" style="width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 16px;"></div>
          <div class="loading-skeleton" style="width: 200px; height: 24px; border-radius: 4px; margin: 0 auto 8px;"></div>
          <div class="loading-skeleton" style="width: 160px; height: 16px; border-radius: 4px; margin: 0 auto;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
